server {
    server_name v-nexus.editech.vn;

    location / {
        proxy_pass http://160.30.136.146:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-NginX-Proxy true;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
        client_max_body_size 1000M;
        add_header 'Content-Security-Policy' 'upgrade-insecure-requests';
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/v-nexus.editech.vn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/v-nexus.editech.vn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = v-nexus.editech.vn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name v-nexus.editech.vn;
    return 404; # managed by Certbot
}
