# docker-compose.lite.yml — Phiên bản nhẹ cho máy cấu hình thấp (không GPU).
# Dùng: docker compose -f docker-compose.lite.yml up -d
# Model: Qwen3 1.7B (chạy CPU, ~1GB RAM)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vnexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnexus}
      POSTGRES_DB: ${POSTGRES_DB:-vnexus}
    volumes:
      - vnexus_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vnexus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Không reservation GPU — chạy CPU-only
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  mcp_server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports:
      - "8500:8100"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://vnexus:vnexus@db:5432/vnexus}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://mcp_server:8100/mcp}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:1.7b}
    depends_on:
      db:
        condition: service_healthy
      mcp_server:
        condition: service_started
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      GATEWAY_URL: http://gateway:8000
    depends_on:
      - gateway
    ports:
      - "8081:8501"

volumes:
  vnexus_db_data:
  ollama_data:
