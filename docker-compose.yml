services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vnexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vnexus}
      POSTGRES_DB: ${POSTGRES_DB:-vnexus}
    volumes:
      - vnexus_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vnexus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp_server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports:
      - "8100:8100"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://vnexus:vnexus@db:5432/vnexus}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://mcp_server:8100/mcp}
    depends_on:
      db:
        condition: service_healthy
      mcp_server:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      GATEWAY_URL: http://gateway:8000
    depends_on:
      - gateway
    ports:
      - "8080:8501"

volumes:
  vnexus_db_data:
