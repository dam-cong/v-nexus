server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Dữ liệu offline tĩnh: trả 404 thật nếu file chưa được sinh ra, KHÔNG
    # fallback về index.html — nếu không, code JS sẽ nhận index.html (200 OK)
    # khi gọi các endpoint này và lỗi khi parse JSON.
    location /data/ {
        try_files $uri =404;
    }

    # SPA fallback — các route còn lại trả về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Gateway
    location /api/ {
        proxy_pass http://gateway:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
